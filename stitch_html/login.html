<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        .main-action-gradient {
            background: linear-gradient(145deg, #0071e3 0%, #0059b5 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9fb;
        }
        h1, h2, h3, .brand-text {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation Bar (Suppressed Shell - Simple Branding Only) -->
<header class="fixed top-0 w-full z-50 glass-header">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="bubble_chart">bubble_chart</span>
<span class="text-xl font-black tracking-tighter text-on-surface brand-text">EvalMind</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-6 py-20 flex flex-col items-center text-center">
<!-- Identity Section -->
<div class="mb-12">
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-3">Welcome back</h1>
<p class="text-on-surface-variant font-body text-lg">Continue your journey with academic precision.</p>
</div>
<!-- Auth Container -->
<div class="w-full space-y-8">
<!-- Third Party Auth -->
<button class="group w-full flex items-center justify-center gap-3 bg-surface-container-lowest py-4 px-6 rounded-full shadow-[0_12px_30px_rgba(26,28,29,0.06)] hover:shadow-[0_14px_40px_rgba(26,28,29,0.08)] transition-all active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" data-alt="Official Google logo with multicolored G on a white circular background for sign-in interface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvpe_bOZp18jX7vjPnNZUiQvnT6dIZ1kFGbrnbHQWQ2meWrEZGOR3LtJovr5i8komtq3rizYpVNbZYBpCmGw4Ir7Frx-NKNo3mj7pimXGuGIsW9G6oEd8OnNQ5XRMN8eZdT2SKRAIXxWPJV1kTJeyECh2QMOmG3XqPnFu_fvZ4QSqtUiM049FebMilEEZsRtvF8cfmFYyb6PqWAjY5XD9MSqXHfPuEncXlVkMze46ZsbpqYpppb8nF77mX1X4IQSMA9TFHgddlP-lL"/>
<span class="font-semibold text-on-surface tracking-tight">Continue with Google</span>
</button>
<!-- Separator -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="text-xs font-bold text-outline uppercase tracking-widest">or</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
<!-- Login Form -->
<form class="space-y-6 text-left">
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-1" for="email">Email</label>
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="email" placeholder="name@domain.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full main-action-gradient py-4 rounded-full text-white font-bold text-lg shadow-[0_12px_30px_rgba(0,89,181,0.2)] hover:shadow-[0_14px_40px_rgba(0,89,181,0.25)] transition-all active:scale-[0.98] mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer Links -->
<div class="flex flex-col gap-4 mt-8">
<button class="text-on-surface-variant font-medium hover:text-primary transition-colors flex items-center justify-center gap-2">
<span>Continue as Guest</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-sm text-outline">
                    Don't have an account? 
                    <a class="text-on-surface font-bold hover:underline decoration-primary underline-offset-4" href="#">Create one</a>
</p>
</div>
</div>
</main>
<!-- Aesthetic Decorative Background Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[30vw] h-[30vw] bg-secondary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<!-- Minimal Legal Footer -->
<footer class="fixed bottom-8 w-full text-center pointer-events-none">
<p class="text-[10px] text-outline font-medium tracking-widest uppercase opacity-50">
            Powered by EvalMind AI Architecture
        </p>
</footer>
</body></html>
